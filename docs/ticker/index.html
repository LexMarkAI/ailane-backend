    const { useState, useEffect, useMemo, useCallback, useRef } = React;

const SB_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNuYnN4d3R2YXpmdnptbHRrdXZ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzExMDM3MDMsImV4cCI6MjA4NjY3OTcwM30.WBM0Pcg9lcZ5wfdDKIcUZoiLh97C50h7ZXL6WlDVZ5g";

// ─── CONSTANTS ──────────────────────────────────────────────────────────
const ACEI_CATEGORIES = {
  unfair_dismissal: { num: 1, label: "Unfair Dismissal", color: "#ef4444", icon: "⚖️" },
  discrimination_harassment: { num: 2, label: "Discrimination & Harassment", color: "#f97316", icon: "🛡️" },

const SIGNIFICANCE_LEVELS = [
  { id: "critical", label: "Critical", color: "#ef4444", weight: 4 },
  { id: "high", label: "High", color: "#f97316", weight: 3 },
  { id: "medium", label: "Medium", color: "#eab308", weight: 2 },
  { id: "low", label: "Low", color: "#64748b", weight: 1 },
];

const EVENT_TYPES = {
  tribunal: { label: "Tribunal Decision", color: "#22d3ee", icon: "⚖️", bg: "rgba(34,211,238,0.08)" },
  legislative: { label: "Legislative Change", color: "#a78bfa", icon: "📜", bg: "rgba(167,139,250,0.08)" },
  enforcement: { label: "Enforcement Action", color: "#ef4444", icon: "🔨", bg: "rgba(239,68,68,0.08)" },
  regulatory: { label: "Regulatory Update", color: "#10b981", icon: "📋", bg: "rgba(16,185,129,0.08)" },
};

const TIERS = {
  operational: { label: "Operational Readiness", price: "£199/mo", color: "#22d3ee" },
  governance: { label: "Governance", price: "£799/mo", color: "#a78bfa" },
  institutional: { label: "Institutional", price: "Custom", color: "#f59e0b" },
};

// ─── API HELPER ─────────────────────────────────────────────────────────
const sbFetch = async (path, token) => {
  const res = await fetch(`${SB_URL}/rest/v1/${path}`, {
    headers: { apikey: SB_ANON, Authorization: `Bearer ${token || SB_ANON}`, "Content-Type": "application/json" }
  });
  if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
  return res.json();
};

// ─── HELPERS ────────────────────────────────────────────────────────────
const timeAgo = (dateStr) => {
  if (!dateStr) return "";
  const diff = Date.now() - new Date(dateStr).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return "Just now";
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  const days = Math.floor(hrs / 24);
  if (days < 7) return `${days}d ago`;
  if (days < 30) return `${Math.floor(days/7)}w ago`;
  return new Date(dateStr).toLocaleDateString("en-GB", { day: "numeric", month: "short" });
};

const assignSignificance = (event) => {
  if (event._type === "tribunal") {
    const comp = parseFloat(event.compensation_awarded) || 0;
    if (comp > 100000) return "critical";
    if (comp > 50000) return "high";
    if (comp > 10000) return "medium";
    return "low";
  }
  if (event._type === "legislative") {
    const type = (event.legislation_type || "").toLowerCase();
    if (type.includes("act")) return "high";
    return "medium";
  }
  if (event._type === "enforcement") return "high";
  return "medium";
};

// ─── SHARED COMPONENTS ──────────────────────────────────────────────────
const Badge = ({ children, color = "#22d3ee" }) => (
  <span style={{ display: "inline-flex", alignItems: "center", padding: "2px 8px", borderRadius: 3, fontSize: 9, fontWeight: 600, letterSpacing: "0.5px", textTransform: "uppercase", background: `${color}15`, color, border: `1px solid ${color}30` }}>{children}</span>
);

const SigBadge = ({ level }) => {
  const sig = SIGNIFICANCE_LEVELS.find(s => s.id === level) || SIGNIFICANCE_LEVELS[3];
  return (
    <span style={{ display: "inline-flex", alignItems: "center", gap: 4, padding: "2px 8px", borderRadius: 3, fontSize: 9, fontWeight: 700, letterSpacing: "0.8px", textTransform: "uppercase", background: `${sig.color}15`, color: sig.color, border: `1px solid ${sig.color}30` }}>
      <span style={{ width: 5, height: 5, borderRadius: "50%", background: sig.color }} />
      {sig.label}
    </span>
  );
};

const CatTag = ({ category }) => {
  const cat = ACEI_CATEGORIES[category];
  if (!cat) return <span style={{ fontSize: 10, color: "#475569" }}>Unclassified</span>;
  return (
    <span style={{ display: "inline-flex", alignItems: "center", gap: 3, padding: "2px 7px", borderRadius: 3, fontSize: 9, fontWeight: 600, background: `${cat.color}12`, color: cat.color, border: `1px solid ${cat.color}25` }}>
      {cat.num}. {cat.label}
    </span>
  );
};

// ─── MAIN COMPONENT ─────────────────────────────────────────────────────
function AilaneTicker() {
  // Auth state
  const [token, setToken] = useState(null);
  const [user, setUser] = useState(null);
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [authLoading, setAuthLoading] = useState(true);
  const [authError, setAuthError] = useState("");

  // Tier demo selector
  const [currentTier, setCurrentTier] = useState("institutional");

  // Data
  const [events, setEvents] = useState([]);
  const [loading, setLoading] = useState(true);
  const [refreshing, setRefreshing] = useState(false);

  // Filters
  const [categoryFilter, setCategoryFilter] = useState(new Set());
  const [significanceFilter, setSignificanceFilter] = useState(new Set());
  const [typeFilter, setTypeFilter] = useState(new Set());
  const [searchQuery, setSearchQuery] = useState("");
  const [filtersOpen, setFiltersOpen] = useState(false);

  // Detail panel
  const [selectedEvent, setSelectedEvent] = useState(null);
  const [panelOpen, setPanelOpen] = useState(false);
  const [aiSummary, setAiSummary] = useState(null);
  const [aiLoading, setAiLoading] = useState(false);

  // Stats
  const [stats, setStats] = useState({ tribunal: 0, legislative: 0, enforcement: 0, total: 0 });

  // Mobile detection
  const [isMobile, setIsMobile] = useState(window.innerWidth < 768);
  useEffect(() => {
    const handleResize = () => setIsMobile(window.innerWidth < 768);
    window.addEventListener("resize", handleResize);
    return () => window.removeEventListener("resize", handleResize);
  }, []);

  // ─── AUTH: Restore session ──────────────────────────────────────────
  useEffect(() => {
    const saved = localStorage.getItem("ailane-ticker-token");
    const savedUser = localStorage.getItem("ailane-ticker-user");
    if (saved) {
      setToken(saved);
      try { setUser(JSON.parse(savedUser)); } catch(e) {}
    }
    setAuthLoading(false);
  }, []);

  const handleLogin = async () => {
    setAuthError("");
    try {
      const res = await fetch(`${SB_URL}/auth/v1/token?grant_type=password`, {
        method: "POST",
        headers: { apikey: SB_ANON, "Content-Type": "application/json" },
        body: JSON.stringify({ email, password }),
      });
      const data = await res.json();
      if (data.access_token) {
        setToken(data.access_token);
        setUser(data.user);
        localStorage.setItem("ailane-ticker-token", data.access_token);
        localStorage.setItem("ailane-ticker-user", JSON.stringify(data.user));
      } else {
        setAuthError(data.error_description || data.msg || "Authentication failed");
      }
    } catch (e) {
      setAuthError("Connection error — please check your network");
    }
  };

  const handleLogout = () => {
    setToken(null);
    setUser(null);
    localStorage.removeItem("ailane-ticker-token");
    localStorage.removeItem("ailane-ticker-user");
  };

  // ─── DATA LOADING ───────────────────────────────────────────────────
  const loadEvents = useCallback(async (isRefresh = false) => {
    if (!token) return;
    if (isRefresh) setRefreshing(true); else setLoading(true);

    try {
      const [tribunalData, legislativeData, enforcementData] = await Promise.all([
        sbFetch("tribunal_decisions?order=decision_date.desc&limit=100&select=id,title,decision_date,acei_category,jurisdiction,case_number,compensation_awarded,source_url", token),
        sbFetch("legislative_changes?employment_related=eq.true&order=date_published.desc&limit=50&select=id,title,date_published,legislation_type,acei_categories,source_url,status", token),
        sbFetch("enforcement_events_unified?order=event_date.desc&limit=50&select=id,title,event_date,event_type,source,significance,acei_category,jurisdiction_code,source_url,description", token).catch(() => []),
      ]);

      const unified = [];

      tribunalData.forEach(t => unified.push({
        ...t, _type: "tribunal", _date: t.decision_date, _title: t.title,
        _category: t.acei_category, _jurisdiction: t.jurisdiction || "GB",
      }));

      legislativeData.forEach(l => unified.push({
        ...l, _type: "legislative", _date: l.date_published, _title: l.title,
        _category: l.acei_categories?.[0] || null, _categories: l.acei_categories || [],
        _jurisdiction: "GB",
      }));

      enforcementData.forEach(e => unified.push({
        ...e, _type: "enforcement", _date: e.event_date, _title: e.title,
        _category: e.acei_category, _jurisdiction: e.jurisdiction_code || "GB",
      }));

      unified.forEach(e => { e._significance = e.significance || assignSignificance(e); });
      unified.sort((a, b) => new Date(b._date || 0) - new Date(a._date || 0));

      setEvents(unified);
      setStats({
        tribunal: tribunalData.length,
        legislative: legislativeData.length,
        enforcement: enforcementData.length,
        total: unified.length,
      });
    } catch (e) {
      console.error("Ticker load error:", e);
    }
    setLoading(false);
    setRefreshing(false);
  }, [token]);

  useEffect(() => { loadEvents(); }, [loadEvents]);

  // Auto-refresh every 5 minutes
  useEffect(() => {
    if (!token) return;
    const interval = setInterval(() => loadEvents(true), 300000);
    return () => clearInterval(interval);
  }, [token, loadEvents]);

  // ─── AI SUMMARY (calls Supabase Edge Function) ─────────────────────
  const generateAiSummary = async (event) => {
    setAiLoading(true);
    setAiSummary(null);
    try {
      // Call Supabase Edge Function for AI summary generation
      const res = await fetch(`${SB_URL}/functions/v1/generate-event-summary`, {
        method: "POST",
        headers: {
          apikey: SB_ANON,
          Authorization: `Bearer ${token}`,
          "Content-Type": "application/json",
        },
        body: JSON.stringify({
          event_type: event._type,
          event_data: {
            title: event._title,
            case_number: event.case_number,
            date: event._date,
            category: event._category,
            categories: event._categories || (event._category ? [event._category] : []),
            jurisdiction: event._jurisdiction,
            compensation: event.compensation_awarded,
            legislation_type: event.legislation_type,
            status: event.status,
            event_type: event.event_type,
            source: event.source,
            description: event.description,
          },
          tier: currentTier,
          analysis_mode: "ticker_deep_analysis",
        }),
      });
      const data = await res.json();
      setAiSummary(data.summary || data.analysis || data.content || "Analysis generated — see full report.");
    } catch (e) {
      console.error("AI summary error:", e);
      // Fallback: generate a structured placeholder
      setAiSummary(generateFallbackSummary(event));
    }
    setAiLoading(false);
  };

  const generateFallbackSummary = (event) => {
    const cat = ACEI_CATEGORIES[event._category];
    if (event._type === "tribunal") {
      return `EXECUTIVE SUMMARY\nTribunal decision in ${cat?.label || "employment law"} proceedings. ${event.compensation_awarded ? `Compensation of £${parseFloat(event.compensation_awarded).toLocaleString()} awarded.` : "Compensation details pending extraction."} Case requires analysis for precedent implications.\n\nKEY FINDINGS\n• Decision filed under ACEI Category ${cat?.num || "—"}: ${cat?.label || "Pending Classification"}\n• Jurisdiction: ${event._jurisdiction === "GB" ? "England & Wales" : event._jurisdiction}\n• Significance: ${(SIGNIFICANCE_LEVELS.find(s => s.id === event._significance) || {}).label || "Medium"}\n\nACEI IMPACT\nPrimary impact on Category ${cat?.num || "—"}. Full sub-index recalculation (EVI, EII, SCI) will incorporate this decision in the next scoring cycle.\n\nACTION REQUIRED\nReview decision for policy alignment gaps. Cross-reference with existing compliance frameworks.\n\nLEGAL FIRM ADVISORY NOTE\nPotential advisory opportunity for clients in affected sector. Consider client briefing on precedent implications.`;
    }
    if (event._type === "legislative") {
      return `EXECUTIVE SUMMARY\nLegislative change: ${event._title}. ${event.legislation_type || "Statutory instrument"} affecting UK employment law obligations.\n\nKEY FINDINGS\n• Type: ${event.legislation_type || "Not specified"}\n• Status: ${event.status || "Published"}\n• Affected ACEI Categories: ${(event._categories || []).map(c => ACEI_CATEGORIES[c]?.label).filter(Boolean).join(", ") || "Classification pending"}\n\nRRI PILLAR IMPACT\nRequires assessment across: Policy Alignment, Contractual Conformity, Training Deployment, Systems & Process Adaptation, Governance Oversight.\n\nACTION REQUIRED\nInitiate Regulatory Activation Transition Protocol (RATP) per RRI Article IX. Complete RCE Registration within 5 business days of verified enactment.\n\nLEGAL FIRM ADVISORY NOTE\nClient advisory opportunity on compliance transition. Board briefing preparation recommended.`;
    }
    return `EXECUTIVE SUMMARY\nEnforcement action: ${event._title}. Regulatory signalling event requiring monitoring.\n\nKEY FINDINGS\n• Source: ${event.source || "Regulatory body"}\n• Category: ${cat?.label || "Pending classification"}\n• Significance: ${event._significance}\n\nACTION REQUIRED\nMonitor for pattern development. Review internal compliance posture against enforcement criteria.`;
  };

  // ─── FILTERING ──────────────────────────────────────────────────────
  const filteredEvents = useMemo(() => {
    return events.filter(e => {
      if (categoryFilter.size > 0) {
        const cats = e._categories || (e._category ? [e._category] : []);
        if (!cats.some(c => categoryFilter.has(c))) return false;
      }
      if (significanceFilter.size > 0 && !significanceFilter.has(e._significance)) return false;
      if (typeFilter.size > 0 && !typeFilter.has(e._type)) return false;
      if (searchQuery.trim()) {
        const q = searchQuery.toLowerCase();
        return (e._title || "").toLowerCase().includes(q) ||
               (e.case_number || "").toLowerCase().includes(q) ||
               (e.description || "").toLowerCase().includes(q);
      }
      return true;
    });
  }, [events, categoryFilter, significanceFilter, typeFilter, searchQuery]);

  const toggleFilter = (set, setter, value) => {
    const next = new Set(set);
    if (next.has(value)) next.delete(value); else next.add(value);
    setter(next);
  };

  const activeFilterCount = categoryFilter.size + significanceFilter.size + typeFilter.size + (searchQuery ? 1 : 0);

  // ─── EVENT HANDLERS ─────────────────────────────────────────────────
  const handleEventClick = (event) => {
    setSelectedEvent(event);
    setPanelOpen(true);
    setAiSummary(null);
  };

  const closePanel = () => {
    setPanelOpen(false);
    setSelectedEvent(null);
    setAiSummary(null);
  };

  // ─── RENDER: Basic Summary (All Tiers) ──────────────────────────────
  const renderBasicSummary = (event) => {
    if (!event) return null;
    const type = EVENT_TYPES[event._type] || EVENT_TYPES.regulatory;
    return (
      <div style={{ padding: "0 0 16px" }}>
        <div style={{ fontSize: 11, color: "#64748b", textTransform: "uppercase", letterSpacing: 1, marginBottom: 10, fontWeight: 600 }}>Key Facts</div>
        <div style={{ display: "grid", gridTemplateColumns: isMobile ? "1fr" : "1fr 1fr", gap: 8, marginBottom: 20 }}>
          {[
            { label: "Event Type", value: type.label },
            { label: "Date", value: event._date ? new Date(event._date).toLocaleDateString("en-GB", { day: "numeric", month: "long", year: "numeric" }) : "—" },
            { label: "Jurisdiction", value: event._jurisdiction === "GB" ? "United Kingdom" : event._jurisdiction },
            { label: "Significance", value: (SIGNIFICANCE_LEVELS.find(s => s.id === event._significance) || {}).label || "—" },
            ...(event._type === "tribunal" ? [
              { label: "Case Number", value: event.case_number || "Not recorded" },
              { label: "Compensation", value: event.compensation_awarded ? `£${parseFloat(event.compensation_awarded).toLocaleString()}` : "Not specified" },
            ] : []),
            ...(event._type === "legislative" ? [
              { label: "Type", value: event.legislation_type || "—" },
              { label: "Status", value: event.status || "—" },
            ] : []),
            ...(event._type === "enforcement" ? [
              { label: "Source", value: event.source || "—" },
              { label: "Action Type", value: event.event_type || "—" },
            ] : []),
          ].map((f, i) => (
            <div key={i} style={{ background: "rgba(255,255,255,0.02)", borderRadius: 6, padding: "8px 12px", border: "1px solid rgba(255,255,255,0.04)" }}>
              <div style={{ fontSize: 9, color: "#64748b", textTransform: "uppercase", letterSpacing: "0.5px", marginBottom: 3 }}>{f.label}</div>
              <div style={{ fontSize: 12, color: "#e2e8f0", fontWeight: 500 }}>{f.value}</div>
            </div>
          ))}
        </div>

        <div style={{ fontSize: 11, color: "#64748b", textTransform: "uppercase", letterSpacing: 1, marginBottom: 8, fontWeight: 600 }}>ACEI Category Impact</div>
        <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 20 }}>
          {(event._categories || (event._category ? [event._category] : [])).map((c, i) => (
            <CatTag key={i} category={c} />
          ))}
          {!(event._categories?.length || event._category) && (
            <span style={{ fontSize: 11, color: "#475569", fontStyle: "italic" }}>Category classification pending</span>
          )}
        </div>

        {event.description && (
          <div>
            <div style={{ fontSize: 11, color: "#64748b", textTransform: "uppercase", letterSpacing: 1, marginBottom: 8, fontWeight: 600 }}>Description</div>
            <div style={{ fontSize: 13, color: "#cbd5e1", lineHeight: 1.6, padding: "12px 14px", background: "rgba(255,255,255,0.02)", borderRadius: 6, border: "1px solid rgba(255,255,255,0.04)" }}>
              {event.description}
            </div>
          </div>
        )}

        {event.source_url && (
          <div style={{ marginTop: 16 }}>
            <a href={event.source_url} target="_blank" rel="noopener noreferrer" style={{
              display: "inline-flex", alignItems: "center", gap: 6, fontSize: 12, color: "#22d3ee", textDecoration: "none",
              padding: "6px 12px", borderRadius: 6, border: "1px solid rgba(34,211,238,0.2)", background: "rgba(34,211,238,0.05)",
            }}>
              📄 View Original Source <span style={{ fontSize: 9, opacity: 0.6 }}>↗</span>
            </a>
          </div>
        )}
      </div>
    );
  };

  // ─── RENDER: AI Summary Section ─────────────────────────────────────
  const renderAiSection = () => {
    if (currentTier === "operational") {
      return (
        <div style={{ marginTop: 20, padding: 20, borderRadius: 8, background: "linear-gradient(135deg, rgba(245,158,11,0.06), rgba(167,139,250,0.04))", border: "1px solid rgba(245,158,11,0.15)", textAlign: "center" }}>
          <div style={{ fontSize: 24, marginBottom: 8 }}>🔒</div>
          <div style={{ fontSize: 13, fontWeight: 600, color: "#f59e0b", marginBottom: 4 }}>AI-Powered Deep Analysis</div>
          <div style={{ fontSize: 11, color: "#94a3b8", marginBottom: 12 }}>Institutional-grade analysis with precedent mapping, sector impact assessment, and legal advisory notes</div>
          <div style={{ display: "inline-flex", padding: "8px 16px", borderRadius: 6, fontSize: 12, fontWeight: 600, background: "rgba(245,158,11,0.1)", color: "#f59e0b", border: "1px solid rgba(245,158,11,0.25)", cursor: "pointer" }}>
            Upgrade to Governance · £799/mo
          </div>
        </div>
      );
    }

    return (
      <div style={{ marginTop: 20 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
          <div style={{ fontSize: 11, color: "#64748b", textTransform: "uppercase", letterSpacing: 1, fontWeight: 600, display: "flex", alignItems: "center", gap: 6 }}>
            <span style={{ width: 6, height: 6, borderRadius: "50%", background: currentTier === "institutional" ? "#f59e0b" : "#a78bfa" }} />
            {currentTier === "institutional" ? "Institutional AI Analysis" : "Governance AI Analysis"}
          </div>
          {!aiSummary && !aiLoading && (
            <button onClick={() => generateAiSummary(selectedEvent)} style={{
              background: "linear-gradient(135deg, #22d3ee, #06b6d4)", border: "none", borderRadius: 6,
              padding: "7px 16px", fontSize: 11, fontWeight: 600, color: "#0a0e1a", cursor: "pointer", letterSpacing: "0.5px",
            }}>

                    onMouseLeave={e => { if (!isSelected) { e.currentTarget.style.background = "rgba(255,255,255,0.015)"; } }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 12 }}>
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ fontSize: isMobile ? 12 : 13, fontWeight: 500, color: "#e2e8f0", lineHeight: 1.4, overflow: "hidden", textOverflow: "ellipsis", display: "-webkit-box", WebkitLineClamp: 2, WebkitBoxOrient: "vertical" }}>
                          {event._title}
                        </div>
                        <div style={{ display: "flex", flexWrap: "wrap", alignItems: "center", gap: 5, marginTop: 6 }}>
                          <span style={{ fontSize: 9, fontWeight: 600, padding: "2px 6px", borderRadius: 3, background: type.bg, color: type.color, letterSpacing: "0.3px" }}>{type.icon} {type.label}</span>
                          <SigBadge level={event._significance} />
                          {!isMobile && (event._categories || (event._category ? [event._category] : [])).slice(0, 2).map((c, ci) => (
                            <CatTag key={ci} category={c} />
                          ))}
                          {!isMobile && event.case_number && (
                            <span style={{ fontSize: 10, color: "#475569", fontFamily: "'JetBrains Mono',monospace" }}>{event.case_number}</span>
                          )}
                        </div>
                      </div>
                      <div style={{ textAlign: "right", flexShrink: 0 }}>
                        <div style={{ fontSize: 10, color: "#64748b", whiteSpace: "nowrap" }}>{timeAgo(event._date)}</div>
                        {event.compensation_awarded && (
                          <div style={{ fontSize: 12, fontWeight: 700, color: "#f59e0b", marginTop: 4, fontFamily: "'JetBrains Mono',monospace" }}>
                            £{parseFloat(event.compensation_awarded).toLocaleString()}
                          </div>
                        )}
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </main>

        {/* ─── RIGHT: DETAIL PANEL ───────────────────────────────────────── */}
        {selectedEvent && (
          isMobile ? (
            // Mobile: full-screen overlay
            <div style={{ position: "fixed", top: 0, left: 0, right: 0, bottom: 0, zIndex: 200, display: "flex", flexDirection: "column" }}>
              <div onClick={closePanel} style={{ position: "absolute", inset: 0, background: "rgba(0,0,0,0.6)" }} />
              <div style={{ position: "relative", marginTop: "10vh", flex: 1, background: "#0a0e1a", borderTop: "1px solid rgba(34,211,238,0.15)", borderRadius: "16px 16px 0 0", overflowY: "auto", zIndex: 201 }}>
                <div style={{ padding: "16px 18px" }}>
                  {/* Drag indicator */}
                  <div style={{ width: 40, height: 4, borderRadius: 2, background: "rgba(255,255,255,0.15)", margin: "0 auto 14px" }} />

                  {/* Header */}
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 16, paddingBottom: 12, borderBottom: "1px solid rgba(255,255,255,0.06)" }}>
                    <div style={{ flex: 1 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 6, flexWrap: "wrap" }}>
                        <span style={{ fontSize: 9, fontWeight: 600, padding: "2px 6px", borderRadius: 3, background: EVENT_TYPES[selectedEvent._type]?.bg, color: EVENT_TYPES[selectedEvent._type]?.color }}>{EVENT_TYPES[selectedEvent._type]?.icon} {EVENT_TYPES[selectedEvent._type]?.label}</span>
                        <SigBadge level={selectedEvent._significance} />
                      </div>
                      <div style={{ fontSize: 14, fontWeight: 600, color: "#e2e8f0", lineHeight: 1.4 }}>{selectedEvent._title}</div>
                    </div>
                    <button onClick={closePanel} style={{ background: "rgba(255,255,255,0.05)", border: "none", borderRadius: 6, width: 28, height: 28, cursor: "pointer", color: "#94a3b8", fontSize: 14, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, marginLeft: 10 }}>✕</button>
                  </div>

                  {/* Tier badge */}
                  <div style={{ display: "flex", alignItems: "center", gap: 6, padding: "6px 10px", borderRadius: 6, background: `${TIERS[currentTier].color}08`, border: `1px solid ${TIERS[currentTier].color}20`, marginBottom: 16 }}>
                    <span style={{ width: 5, height: 5, borderRadius: "50%", background: TIERS[currentTier].color }} />
                    <span style={{ fontSize: 10, color: TIERS[currentTier].color, fontWeight: 600 }}>{TIERS[currentTier].label} · {TIERS[currentTier].price}</span>
                  </div>

                  {renderBasicSummary(selectedEvent)}
                  {renderAiSection()}
                </div>
              </div>
            </div>
          ) : (
            // Desktop: side panel
            <aside style={{ width: panelOpen ? 420 : 0, flexShrink: 0, borderLeft: "1px solid rgba(255,255,255,0.06)", overflowY: "auto", overflowX: "hidden", background: "rgba(255,255,255,0.01)", transition: "width 0.3s ease" }}>
              <div style={{ width: 420, padding: "16px 20px" }}>
                {/* Header */}
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 16, paddingBottom: 12, borderBottom: "1px solid rgba(255,255,255,0.06)" }}>
                  <div style={{ flex: 1 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 6 }}>
                      <span style={{ fontSize: 9, fontWeight: 600, padding: "2px 6px", borderRadius: 3, background: EVENT_TYPES[selectedEvent._type]?.bg, color: EVENT_TYPES[selectedEvent._type]?.color }}>{EVENT_TYPES[selectedEvent._type]?.icon} {EVENT_TYPES[selectedEvent._type]?.label}</span>
                      <SigBadge level={selectedEvent._significance} />
                    </div>
                    <div style={{ fontSize: 15, fontWeight: 600, color: "#e2e8f0", lineHeight: 1.4 }}>{selectedEvent._title}</div>
                  </div>
                  <button onClick={closePanel} style={{ background: "rgba(255,255,255,0.05)", border: "none", borderRadius: 6, width: 28, height: 28, cursor: "pointer", color: "#94a3b8", fontSize: 14, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, marginLeft: 10 }}>✕</button>
                </div>

                {/* Tier badge */}
                <div style={{ display: "flex", alignItems: "center", gap: 6, padding: "6px 10px", borderRadius: 6, background: `${TIERS[currentTier].color}08`, border: `1px solid ${TIERS[currentTier].color}20`, marginBottom: 16 }}>
                  <span style={{ width: 5, height: 5, borderRadius: "50%", background: TIERS[currentTier].color }} />
                  <span style={{ fontSize: 10, color: TIERS[currentTier].color, fontWeight: 600, letterSpacing: "0.5px" }}>{TIERS[currentTier].label} · {TIERS[currentTier].price}</span>
                </div>

                {renderBasicSummary(selectedEvent)}
                {renderAiSection()}
              </div>
            </aside>
          )
        )}
      </div>
    </div>
  );
}

    // ─── MOUNT ──────────────────────────────────────────────────────────
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(AilaneTicker));
  </script>
</body>
</html>
